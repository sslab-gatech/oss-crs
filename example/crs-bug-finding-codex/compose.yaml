##############################################################################
#                        CRS Compose Configuration                           #
#               Example for crs-bug-finding-codex (bug-finding)              #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- CRS (crs-bug-finding-codex) -------------------------------------------
# The ASAN snapshot sidecar is declared in crs.yaml (snapshot: true / run_snapshot: true)
# and handled automatically by the framework.
crs-bug-finding-codex:
  cpuset: "2-7"
  memory: "16G"
  llm_budget: 10
  additional_env:
    # Override CRS defaults here.
    # Pinned snapshots (as of 2026-02-16):
    #   gpt-5-2025-08-07, gpt-5-mini-2025-08-07, gpt-5-pro-2025-10-06,
    #   gpt-5.1-2025-11-13, gpt-5.2-2025-12-11
    # Codex models (canonical IDs):
    #   gpt-5-codex, gpt-5.1-codex, gpt-5.1-codex-mini, gpt-5.2-codex
    CRS_AGENT: codex
    CODEX_MODEL: gpt-5.4
    # AGENT_TIMEOUT: "3600"                          # Optional: seconds, 0 = no limit (default)

# --- LLM Configuration -----------------------------------------------------
llm_config:
  litellm:
    mode: internal
    internal:
      config_path: ./example/crs-bug-finding-codex/litellm-config.yaml
